<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FlightLog — Nouveau Vol</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --rose-deep:    #c2185b;
            --rose-mid:     #e91e8c;
            --rose-soft:    #f48fb1;
            --rose-pale:    #fce4ec;
            --rose-blush:   #fff0f6;
            --rose-border:  #f8bbd0;
            --text-dark:    #2d1b25;
            --text-mid:     #6d3a50;
            --text-light:   #b07090;
            --white:        #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--rose-blush);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(233,30,140,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(194,24,91,0.06) 0%, transparent 60%);
        }

        .card {
            background: var(--white);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 520px;
            box-shadow:
                0 4px 24px rgba(194,24,91,0.10),
                0 1px 4px rgba(194,24,91,0.06);
            border: 1px solid var(--rose-border);
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity:0; transform: translateY(20px); }
            to   { opacity:1; transform: translateY(0); }
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--rose-deep);
            letter-spacing: 0.5px;
        }

        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.9rem;
            color: var(--text-dark);
            margin-bottom: 6px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 36px;
            font-weight: 300;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-mid);
            margin-bottom: 7px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--rose-border);
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--text-dark);
            background: var(--rose-blush);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            outline: none;
        }

        input::placeholder { color: var(--text-light); font-weight: 300; }

        input:focus {
            border-color: var(--rose-mid);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(233,30,140,0.10);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: linear-gradient(135deg, var(--rose-mid), var(--rose-deep));
            color: var(--white);
            border: none;
            border-radius: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 16px rgba(194,24,91,0.25);
        }

        button:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(194,24,91,0.30);
        }

        button:active { transform: translateY(0); }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.88rem;
        }

        .footer-link a {
            color: var(--rose-deep);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link a:hover { color: var(--rose-mid); }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">
        <div class="logo-icon">✈️</div>
        <span class="logo-text">FlightLog</span>
    </div>

    <h2>Nouveau vol</h2>
    <p class="subtitle">Renseignez les informations du vol à enregistrer.</p>

    <form action="/submit-flight" method="POST">
        <div class="row">
            <div class="form-group">
                <label for="origin">Origine</label>
                <input type="text" id="origin" name="origin" placeholder="ex: LFPG" required maxlength="10">
            </div>
            <div class="form-group">
                <label for="destination">Destination</label>
                <input type="text" id="destination" name="destination" placeholder="ex: KJFK" required maxlength="10">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="duration">Durée (heures)</label>
                <input type="number" step="0.1" id="duration" name="duration" placeholder="ex: 2.5" required>
            </div>
            <div class="form-group">
                <label for="aircraft_tail_number">Immatriculation</label>
                <input type="text" id="aircraft_tail_number" name="aircraft_tail_number" placeholder="ex: F-GZCP" required>
            </div>
        </div>

        <div class="form-group">
            <label for="pilot_name">Nom du pilote</label>
            <input type="text" id="pilot_name" name="pilot_name" placeholder="Nom complet du pilote" required>
        </div>

        <div class="form-group">
            <label for="submitted_by">Soumis par</label>
            <input type="text" id="submitted_by" name="submitted_by" placeholder="Votre nom" required>
        </div>

        <button type="submit">✈ Enregistrer le vol</button>
    </form>

    <div class="footer-link">
        <a href="/list">Voir le journal de bord →</a>
    </div>
</div>

</body>
</html>
